services:
  postgres:
    image: postgres:15
    container_name: oil-postgres
    environment:
      POSTGRES_USER: oil
      POSTGRES_PASSWORD: oil123
      POSTGRES_DB: oil_gas
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oil"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oil-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: oil-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - oil-network
    restart: unless-stopped

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: oil-jupyter
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    command: "start-notebook.py --IdentityProvider.token=''"
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./etl:/home/jovyan/etl
      - ./data:/home/jovyan/data
      - ./mlruns:/home/jovyan/mlruns
    depends_on:
      - postgres
      - minio
    networks:
      - oil-network
    restart: unless-stopped

  superset:
    image: apache/superset:latest-dev
    container_name: oil-superset
    environment:
      SUPERSET_SECRET_KEY: 'your-secret-key-change-this'
      SUPERSET_SQLALCHEMY_DATABASE_URI: postgresql://oil:oil123@postgres:5432/superset_db
    ports:
      - "8088:8088"
    volumes:
      - superset_data:/app/superset_home
    command: >
      sh -c "
        if [ ! -f /app/superset_home/.init_done ]; then
          superset db upgrade &&
          superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin &&
          superset init &&
          touch /app/superset_home/.init_done
        fi &&
        superset run -p 8088 --host 0.0.0.0 --with-threads --reload --debugger
      "
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 60s
      timeout: 30s
      retries: 5
    networks:
      - oil-network
    restart: unless-stopped

networks:
  oil-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  superset_data: